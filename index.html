<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro RPG Magic Battle - Final</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #080810; 
            cursor: none; /* マウスを隠して魔法の光を目立たせる */
            user-select: none;
        }

        canvas {
            display: block;
            image-rendering: pixelated; /* ドット絵をくっきりさせる */
        }

        /* レトロなUI */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-family: 'Courier New', Courier, monospace;
            z-index: 10;
        }

        #status-window {
            color: #ffffff;
            font-size: 20px;
            border: 3px solid #ffffff;
            background: #000000;
            padding: 10px 15px;
            box-shadow: 4px 4px 0px #444;
        }

        #message-window {
            color: #ffffff;
            font-size: 14px;
            text-shadow: 2px 2px #000;
        }

        .red-flash {
            color: #ff4444 !important;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="message-window">
        魔物を 浄化せよ！<br>
        <span style="font-size: 10px;">※赤い魔弾に当たると 減点</span>
    </div>
    <div id="status-window">
        SCORE: <span id="score">0000</span>
    </div>
</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    let particles = [];
    let enemies = [];
    let bullets = [];
    let score = 0;
    const mouse = { x: -100, y: -100 };
    
    // 内部解像度（低解像度でレトロ感を出す）
    const GAME_WIDTH = 256; 
    const GAME_HEIGHT = 224;
    let scale = 1;

    function resize() {
        scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
        scale = Math.max(1, Math.floor(scale)); 
        canvas.width = GAME_WIDTH * scale;
        canvas.height = GAME_HEIGHT * scale;
        ctx.scale(scale, scale);
        ctx.imageSmoothingEnabled = false;
    }

    window.addEventListener('resize', resize);
    resize();

    // マウス操作
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX / scale;
        mouse.y = e.clientY / scale;
        // マウスの軌跡にリボンのパーティクルを生成
        for (let i = 0; i < 4; i++) {
            particles.push(new PixelParticle());
        }
    });

    // 魔法のパーティクル（桃色のリボン）
    class PixelParticle {
        constructor() {
            this.x = mouse.x;
            this.y = mouse.y;
            this.speedX = (Math.random() - 0.5) * 1.5;
            this.speedY = Math.random() * 0.8 + 0.2; 
            const colors = ['#FF00FF', '#FF66FF', '#FFFF00', '#00FFFF'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.size = Math.random() > 0.5 ? 2 : 3;
            this.life = 30 + Math.random() * 10;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life--;
        }
        draw() {
            if (this.life < 10 && this.life % 2 === 0) return;
            ctx.fillStyle = this.color;
            ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
        }
    }

    // 敵の魔弾クラス
    class EnemyBullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            const angle = Math.atan2(mouse.y - y, mouse.x - x);
            this.speed = 1.1;
            this.vx = Math.cos(angle) * this.speed;
            this.vy = Math.sin(angle) * this.speed;
            this.alive = true;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            // プレイヤー（マウス）との当たり判定
            const dist = Math.sqrt((this.x - mouse.x)**2 + (this.y - mouse.y)**2);
            if (dist < 6) {
                this.alive = false;
                score = Math.max(0, score - 50); // ペナルティ
                updateScoreDisplay(true);
            }
            if (this.x < 0 || this.x > GAME_WIDTH || this.y < 0 || this.y > GAME_HEIGHT) this.alive = false;
        }
        draw() {
            ctx.fillStyle = "#FF0000";
            ctx.fillRect(Math.floor(this.x), Math.floor(this.y), 3, 3);
        }
    }

    // モンスタークラス
    class Enemy {
        constructor(type) {
            this.type = type; // 'slime', 'wisp', 'mage'
            this.width = 16;
            this.height = 16;
            this.x = Math.random() * (GAME_WIDTH - 20);
            this.y = Math.random() * (GAME_HEIGHT - 100) + 40;
            this.isHit = false;
            this.hitTimer = 0;
            this.alive = true;
            this.angle = Math.random() * Math.PI * 2;
            this.shootTimer = Math.random() * 60;

            if (type === 'wisp') { this.points = 250; this.speed = 1.2; }
            else if (type === 'mage') { this.points = 500; }
            else { this.points = 100; }
        }

        update() {
            if (this.isHit) {
                this.hitTimer++;
                if (this.hitTimer === 1) {
                    score += this.points;
                    updateScoreDisplay();
                }
                if (this.hitTimer > 20) this.alive = false;
                return;
            }

            // 個別の動き
            if (this.type === 'wisp') {
                this.angle += 0.08;
                this.x += Math.cos(this.angle) * 1.5;
                this.y += Math.sin(this.angle * 0.5) * 0.8;
            } else if (this.type === 'mage') {
                this.shootTimer++;
                if (this.shootTimer > 80) {
                    bullets.push(new EnemyBullet(this.x + 8, this.y + 8));
                    this.shootTimer = 0;
                }
            } else if (this.type === 'slime') {
                this.x += Math.sin(this.angle) * 0.3;
                this.angle += 0.02;
            }

            // 当たり判定
            const dx = mouse.x - (this.x + 8);
            const dy = mouse.y - (this.y + 8);
            if (Math.sqrt(dx * dx + dy * dy) < 13) this.isHit = true;
        }

        draw() {
            if (this.isHit && Math.floor(this.hitTimer / 2) % 2 === 0) {
                ctx.fillStyle = "#FFF";
                ctx.fillRect(Math.floor(this.x), Math.floor(this.y), 16, 16);
                return;
            }

            const px = Math.floor(this.x);
            const py = Math.floor(this.y);

            if (this.type === 'slime') {
                ctx.fillStyle = "#4444FF";
                ctx.fillRect(px+4, py+12, 8, 4);
                ctx.fillRect(px+2, py+6, 12, 6);
                ctx.fillRect(px+7, py+2, 2, 2);
            } else if (this.type === 'wisp') {
                ctx.fillStyle = "#FF00FF";
                ctx.fillRect(px+6, py+2, 4, 12);
                ctx.fillRect(px+2, py+6, 12, 4);
                // コア
                ctx.fillStyle = "#FFFF99";
                ctx.fillRect(px+7, py+7, 2, 2);
            } else if (this.type === 'mage') {
                ctx.fillStyle = "#9933FF";
                ctx.fillRect(px+4, py+2, 8, 14); // 体
                ctx.fillStyle = "#000000";
                ctx.fillRect(px+5, py+5, 6, 3); // 目の隠れる部分
                ctx.fillStyle = "#FFFF00";
                ctx.fillRect(px+6, py+6, 1, 1); // 目L
                ctx.fillRect(px+9, py+6, 1, 1); // 目R
            }
        }
    }

    function updateScoreDisplay(flash = false) {
        scoreElement.innerText = score.toString().padStart(4, '0');
        if (flash) {
            scoreElement.classList.add('red-flash');
            setTimeout(() => scoreElement.classList.remove('red-flash'), 200);
        }
    }

    // 敵のスポーン管理
    function spawnSystem() {
        if (enemies.length < 8) {
            const r = Math.random();
            if (r < 0.5) enemies.push(new Enemy('slime'));
            else if (r < 0.8) enemies.push(new Enemy('wisp'));
            else enemies.push(new Enemy('mage'));
        }
    }
    setInterval(spawnSystem, 1000);

    // メインアニメーションループ
    function animate() {
        // 背景と残像効果
        ctx.fillStyle = 'rgba(8, 8, 16, 0.35)';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // 弾の更新
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update();
            bullets[i].draw();
            if (!bullets[i].alive) bullets.splice(i, 1);
        }

        // 敵の更新
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();
            enemies[i].draw();
            if (!enemies[i].alive) enemies.splice(i, 1);
        }

        // 魔法の更新
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
